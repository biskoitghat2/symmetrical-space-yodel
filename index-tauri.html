<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HesabFlow - سیستم حسابداری</title>
    <link href="/fonts/vazirmatn.css" rel="stylesheet" type="text/css" />
    <style>
      body {
        font-family: 'Vazirmatn', sans-serif;
        margin: 0;
        padding: 0;
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
      }
      .dark ::-webkit-scrollbar-thumb {
        background: #262626;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Hide number input arrows (spinners) */
      input[type=number]::-webkit-inner-spin-button, 
      input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
      }
      input[type=number] {
        -moz-appearance: textfield;
      }

      /* Animations */
      @keyframes slideUpFade {
        0% { opacity: 0; transform: translateY(15px) scale(0.98); }
        100% { opacity: 1; transform: translateY(0) scale(1); }
      }
      .animate-slide-up-fade {
        animation: slideUpFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.5) translateY(20px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      .animate-pop-in {
        animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      }

      @keyframes scaleUp {
        0% { opacity: 0; transform: translate(-50%, -45%) scale(0.95); }
        100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      }
      .animate-window-open {
        animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      /* DatePicker Customization */
      .rmdp-container {
        width: 100%;
      }
      .rmdp-input {
        width: 100%;
        height: 38px;
        border-radius: 0;
        border: 1px solid #e5e7eb;
        background-color: #f9fafb;
        font-family: 'Vazirmatn', sans-serif;
        font-size: 0.875rem;
        padding: 0 1rem;
        color: #111827;
      }
      .dark .rmdp-input {
        background-color: #171717;
        border-color: #404040;
        color: white;
      }
      .rmdp-wrapper {
        border-radius: 0 !important;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1) !important;
      }
    </style>
  </head>
  <body class="bg-gray-50 text-slate-900 dark:bg-dark dark:text-gray-100 transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
