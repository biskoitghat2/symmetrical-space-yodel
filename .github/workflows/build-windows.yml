name: Build & Release Windows EXE

on:
  push:
    branches: [main, master]   # wake on push to either default branch
    tags:     ['v*']           # tag push (v1.0.1 etc.) → creates GitHub Release
  workflow_dispatch:           # manual trigger from Actions tab

# Required so softprops/action-gh-release can create / upload assets
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Source + Node ────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── 2. Build React frontend → dist/ ────────────────────────────────
      - name: Build frontend (Vite)
        run: npm run build

      # ── 3. Bundle ESM server.js → CJS via esbuild ──────────────────────
      # @yao-pkg/pkg still uses Babel which cannot parse `import.meta.url`.
      # esbuild rewrites import.meta.url → require('url').pathToFileURL(...)
      # and emits a single CJS file that pkg's bytecode compiler accepts.
      # better-sqlite3 is marked external because we ship its .node file
      # alongside the EXE and load it from disk at runtime.
      - name: Bundle server.js → server.bundle.cjs (esbuild)
        shell: pwsh
        run: |
          npx --yes esbuild server.js `
            --bundle `
            --platform=node `
            --target=node20 `
            --format=cjs `
            --external:better-sqlite3 `
            --outfile=server.bundle.cjs
          if (-not (Test-Path "server.bundle.cjs")) {
            Write-Error "esbuild did NOT produce server.bundle.cjs"
            exit 1
          }
          $sizeKB = [math]::Round((Get-Item "server.bundle.cjs").Length / 1KB, 1)
          Write-Host "OK  server.bundle.cjs : $sizeKB KB"

      # ── 4. Install @yao-pkg/pkg (ESM-capable fork of vercel/pkg) ───────
      - name: Install yao-pkg
        run: npm install -g @yao-pkg/pkg@5.16.1

      # ── 5. Package server.bundle.cjs → hesabflow.exe ───────────────────
      - name: Package server.bundle.cjs as Windows EXE
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          pkg server.bundle.cjs `
            --target node20-win-x64 `
            --output release\hesabflow.exe `
            --public-packages "*"
          if (-not (Test-Path "release\hesabflow.exe")) {
            Write-Error "pkg did NOT produce hesabflow.exe"
            exit 1
          }

      # ── 5. Copy native better_sqlite3.node next to the EXE ─────────────
      - name: Copy better_sqlite3.node next to EXE
        shell: pwsh
        run: |
          $src = Join-Path $PWD "node_modules\better-sqlite3\build\Release\better_sqlite3.node"
          $dst = Join-Path $PWD "release\better_sqlite3.node"
          if (-not (Test-Path $src)) {
            Write-Error "Source missing: $src"
            exit 1
          }
          Copy-Item -LiteralPath $src -Destination $dst -Force
          Write-Host "Copied: $src"
          Write-Host "    -> $dst"

      # ── 6. Verify both files exist and report sizes ────────────────────
      - name: Verify release files
        shell: pwsh
        run: |
          $exe  = "release\hesabflow.exe"
          $node = "release\better_sqlite3.node"
          if (-not (Test-Path $exe))  { Write-Error "hesabflow.exe MISSING"; exit 1 }
          if (-not (Test-Path $node)) { Write-Error "better_sqlite3.node MISSING"; exit 1 }
          $exeMB  = [math]::Round((Get-Item $exe ).Length / 1MB, 1)
          $nodeMB = [math]::Round((Get-Item $node).Length / 1MB, 1)
          Write-Host "OK  hesabflow.exe       : $exeMB MB"
          Write-Host "OK  better_sqlite3.node : $nodeMB MB"

      # ── 7. Compress both into HesabFlow-Windows.zip ────────────────────
      # Use absolute paths to avoid working-directory ambiguity
      - name: Create ZIP package
        shell: pwsh
        run: |
          $exe  = Join-Path $PWD "release\hesabflow.exe"
          $node = Join-Path $PWD "release\better_sqlite3.node"
          $zip  = Join-Path $PWD "release\HesabFlow-Windows.zip"
          if (Test-Path $zip) { Remove-Item $zip -Force }
          Compress-Archive `
            -LiteralPath $exe, $node `
            -DestinationPath $zip `
            -CompressionLevel Optimal `
            -Force
          if (-not (Test-Path $zip)) { Write-Error "ZIP not created"; exit 1 }
          $zipMB = [math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "OK  HesabFlow-Windows.zip : $zipMB MB"

      # ── 8. Upload as workflow artifact (every run) ─────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HesabFlow-Windows
          path: release/HesabFlow-Windows.zip
          retention-days: 30

      # ── 9. Create GitHub Release (only when a v* tag is pushed) ────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/HesabFlow-Windows.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          name: "HesabFlow ${{ github.ref_name }}"
          body: |
            ## حسابفلو — نسخه ویندوز (آماده اجرا)

            ### 📥 دانلود و نصب
            1. فایل **`HesabFlow-Windows.zip`** را از پایین همین صفحه دانلود کنید.
            2. روی فایل zip کلیک راست → **Extract All** → یک پوشه دلخواه (مثلاً `D:\HesabFlow`).
            3. مطمئن شوید این **دو فایل کنار هم** هستند:
               - `hesabflow.exe`
               - `better_sqlite3.node`
            4. روی **`hesabflow.exe`** دوبار کلیک کنید.
               (اگر Windows SmartScreen هشدار داد → **More info** → **Run anyway**)
            5. مرورگر به آدرس `http://localhost:3939` باز می‌شود.

            ### ⚙️ اولین اجرا (Setup)
            در اولین اجرا، صفحه راه‌اندازی نشان داده می‌شود.
            دو مسیر لازم است:
            - **مسیر دیتابیس** — مثل `D:\HesabFlow\Data`
            - **مسیر بک‌آپ** — مثل `D:\HesabFlow\Backup`

            اگر پوشه‌ها وجود نداشته باشند، خودکار ساخته می‌شوند.
            تنظیمات در `config.json` کنار `.exe` ذخیره می‌شود.

            ### 💾 بک‌آپ خودکار
            موقع بستن مرورگر، بک‌آپ کامل دیتابیس با تاریخ شمسی در پوشه بک‌آپ ذخیره می‌شود.
            (نمونه: `HesabFlow_Backup_1405_03_05_14_22_07.db`)

            ### 🛡 ویژگی‌های پایداری
            - **WAL + synchronous=EXTRA** → مقاوم در برابر قطع برق
            - **پشتیبان‌گیری امن مستقیم از SQLite (online backup API)**
            - **بدون وابستگی** — نیاز به نصب Node.js یا هیچ نرم‌افزار دیگری نیست

            ### 🖥 پیش‌نیاز سیستم
            - Windows 10 یا Windows 11 — نسخه ۶۴ بیتی
            - مرورگر Chrome / Firefox / Edge (هر کدام)

            ### ❌ اگر اجرا نشد
            - چک کنید **هر دو فایل** کنار هم باشند (یکی تنها کار نمی‌کند).
            - Antivirus گاهی `.exe` جدید را قرنطینه می‌کند → آن را به Exception اضافه کنید.
            - برای دیدن خطا، CMD باز کنید و دستور `hesabflow.exe` را اجرا کنید.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
